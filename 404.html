<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Página não encontrada - Agência Krio</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <style>
      :root {
        --lime: #d2ff00;
        --ink: #111112;
        --paper: #f4f4ed;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 2rem;
        background: var(--paper);
        color: var(--ink);
        font-family: Arial, sans-serif;
      }

      main {
        width: min(100%, 48rem);
      }

      p {
        max-width: 42rem;
        font-size: 1.1rem;
        line-height: 1.55;
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(3.4rem, 12vw, 8rem);
        line-height: 0.86;
        letter-spacing: -0.06em;
        text-transform: uppercase;
      }

      a {
        display: inline-flex;
        margin-top: 1rem;
        padding: 1rem 1.1rem;
        border-radius: 0.5rem;
        background: var(--lime);
        color: var(--ink);
        font-weight: 900;
        text-transform: uppercase;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Página não encontrada.</h1>
      <p>O endereço pode ter mudado ou não existir. Volte para a página principal da Agência Krio e continue a navegação.</p>
      <a href="/">Voltar para o início</a>
    </main>
  </body>
</html>
